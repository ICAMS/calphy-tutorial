calculations:
#corresponds to 10% composition change
- mode: composition_scaling
  element:
  - Ag
  - Cu
  mass:
  - 107.868
  - 63.546
  composition_scaling:
    output_chemical_composition:
      Ag: 450
      Cu: 50
  lattice: /pc2/users/u/usrtr104/solid.data
  temperature: 800
  pressure: 0
  pair_coeff: '* * /pc2/users/u/usrtr104/.cache/grace/GRACE-1L-OMAT Ag Cu'
  pair_style: grace
  n_equilibration_steps: 1000
  n_iterations: 1
  n_switching_steps: 1000
  queue:
    commands:
    - '#SBATCH -A hpc-prf-mlpfits'
    - '#SBATCH -N 1'
    - '#SBATCH --gres=gpu:a100:1'
    - '#SBATCH --cpus-per-task=12'
    - '#SBATCH --ntasks-per-node=1'
    - source /pc2/users/u/$USER/load_calphy.sh
    - module load system/CUDA/13.0.0
    cores: 1
    queuename: gpu
    scheduler: slurm
    walltime: 02:00:00
  folder_prefix: x10
  #these are simply for speeding up, and not needed!
  equilibration_control: berendsen
  md:
    n_small_steps: 1000
  tolerance:
    pressure: 100

